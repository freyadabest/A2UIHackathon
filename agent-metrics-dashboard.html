<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus Analytics — Agent Metrics Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
  /* ============================== DESIGN SYSTEM ============================== */
  :root {
    /* 4px spacing grid */
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-5: 20px;
    --sp-6: 24px;
    --sp-8: 32px;
    --sp-10: 40px;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-pill: 999px;

    /* accent */
    --accent: #0d9488;
    --accent-soft: rgba(13, 148, 136, 0.12);
    --accent-strong: #0f766e;

    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    --font-display: 'Instrument Serif', Georgia, serif;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  }

  /* Light mode (warm neutrals) */
  :root,
  [data-theme="light"] {
    --bg: #f4f1ec;
    --surface: #fbf9f5;
    --surface-2: #f0ece4;
    --border: #e3ddd2;
    --text: #2b2824;
    --text-muted: #7c756a;
    --text-faint: #a59d90;

    --critical: #dc2626;
    --critical-soft: rgba(220, 38, 38, 0.10);
    --warn: #d97706;
    --warn-soft: rgba(217, 119, 6, 0.10);
    --pos: #16a34a;
    --neg: #dc2626;
  }

  /* Dark mode (warm dark neutrals) */
  [data-theme="dark"] {
    --bg: #1a1816;
    --surface: #232220;
    --surface-2: #2c2a27;
    --border: #3a3733;
    --text: #ece8e1;
    --text-muted: #a39c90;
    --text-faint: #756e63;

    --accent: #2dd4bf;
    --accent-soft: rgba(45, 212, 191, 0.14);
    --accent-strong: #14b8a6;

    --critical: #f87171;
    --critical-soft: rgba(248, 113, 113, 0.12);
    --warn: #fbbf24;
    --warn-soft: rgba(251, 191, 36, 0.12);
    --pos: #4ade80;
    --neg: #f87171;

    --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* ============================== HEADER ============================== */
  header {
    display: flex;
    align-items: center;
    gap: var(--sp-4);
    padding: var(--sp-4) var(--sp-6);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: var(--sp-3);
    margin-right: auto;
  }

  .brand-logo {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 26px;
    line-height: 1;
    letter-spacing: 0.2px;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  .week-counter {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: var(--sp-2) var(--sp-3);
    border-radius: var(--radius-pill);
    white-space: nowrap;
  }
  .week-counter b { color: var(--text); }

  .btn {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: var(--sp-2) var(--sp-4);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--sp-2);
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.05s ease;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:active { transform: translateY(1px); }

  .btn-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  [data-theme="dark"] .btn-accent { color: #0b1f1c; }
  .btn-accent:hover { background: var(--accent-strong); border-color: var(--accent-strong); }

  .icon-btn {
    width: 38px;
    height: 38px;
    padding: 0;
    justify-content: center;
  }

  .btn svg { width: 16px; height: 16px; }

  /* ============================== LAYOUT ============================== */
  main {
    display: grid;
    grid-template-columns: 70% 30%;
    align-items: start;
    height: calc(100vh - 71px);
  }

  .panel-area {
    padding: var(--sp-6);
    overflow-y: auto;
    height: 100%;
  }

  .panel-area-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: var(--sp-5);
  }
  .panel-area-head h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 30px;
  }
  .panel-area-head .hint {
    font-size: 13px;
    color: var(--text-muted);
  }

  .panel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: var(--sp-5);
    align-content: start;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: var(--sp-10);
    color: var(--text-faint);
    font-size: 14px;
  }

  /* ============================== CARDS ============================== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--sp-5);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
    opacity: 0;
    transform: translateY(20px);
    animation: panelIn 400ms ease forwards;
  }
  .card.retiring {
    animation: panelOut 300ms ease forwards;
  }

  @keyframes panelIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes panelOut {
    to { opacity: 0; transform: translateY(-8px); }
  }

  .card.span-2 { grid-column: span 2; }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--sp-2);
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  .card-metric-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-faint);
    margin-top: 2px;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 3px var(--sp-2);
    border-radius: var(--radius-pill);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.low { background: var(--surface-2); color: var(--text-muted); }
  .badge.medium { background: var(--accent-soft); color: var(--accent); }
  .badge.high { background: var(--warn-soft); color: var(--warn); }
  .badge.critical { background: var(--critical-soft); color: var(--critical); }

  .insight {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
  }

  .chart-wrap { position: relative; height: 150px; }
  .spark-wrap { position: relative; height: 70px; }

  /* KPI */
  .kpi-value {
    font-family: var(--font-display);
    font-size: 44px;
    line-height: 1;
    letter-spacing: 0.5px;
  }
  .kpi-value.pos { color: var(--pos); }
  .kpi-value.neg { color: var(--neg); }
  .kpi-trend {
    display: inline-flex;
    align-items: center;
    gap: var(--sp-1);
    font-size: 13px;
    font-weight: 600;
    margin-top: var(--sp-1);
  }
  .kpi-trend.pos { color: var(--pos); }
  .kpi-trend.neg { color: var(--neg); }
  .kpi-trend svg { width: 15px; height: 15px; }

  /* Alert */
  .card.alert {
    border-left: 4px solid var(--critical);
    background: linear-gradient(to right, var(--critical-soft), var(--surface) 40%);
  }
  .card.alert.warn-level {
    border-left-color: var(--warn);
    background: linear-gradient(to right, var(--warn-soft), var(--surface) 40%);
  }
  .alert-head {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    color: var(--critical);
    font-weight: 700;
    font-size: 14px;
  }
  .card.alert.warn-level .alert-head { color: var(--warn); }
  .alert-head svg { width: 18px; height: 18px; }
  .alert-values {
    display: flex;
    gap: var(--sp-6);
    margin: var(--sp-1) 0;
  }
  .alert-val .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-faint);
  }
  .alert-val .num {
    font-family: var(--font-display);
    font-size: 28px;
    line-height: 1.1;
  }
  .alert-val .num.bad { color: var(--critical); }
  .action-btn {
    align-self: flex-start;
    margin-top: var(--sp-1);
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: var(--sp-2) var(--sp-3);
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .action-btn:hover { background: var(--accent-soft); }

  /* Correlation */
  .corr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--sp-4);
  }
  .corr-col .corr-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-faint); margin-bottom: var(--sp-1);
  }
  .corr-link {
    display: inline-flex; align-items: center; gap: var(--sp-1);
    font-size: 11px; color: var(--accent); font-weight: 600;
  }
  .corr-link svg { width: 14px; height: 14px; }

  /* ============================== REASONING LOG ============================== */
  .log-area {
    background: var(--surface);
    border-left: 1px solid var(--border);
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .log-head {
    padding: var(--sp-5) var(--sp-5) var(--sp-3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: var(--sp-2);
  }
  .log-head h2 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 22px;
  }
  .log-head .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent-soft);
  }
  .log-head .pulse.active { animation: pulse 1.4s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--accent-soft); }
    70% { box-shadow: 0 0 0 8px rgba(13,148,136,0); }
    100% { box-shadow: 0 0 0 0 rgba(13,148,136,0); }
  }

  .log-list {
    overflow-y: auto;
    padding: var(--sp-4) var(--sp-5);
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
  }

  .log-entry {
    border-left: 2px solid var(--border);
    padding: 0 0 var(--sp-1) var(--sp-3);
    opacity: 0;
    transform: translateX(24px);
    animation: logIn 350ms ease forwards;
  }
  @keyframes logIn { to { opacity: 1; transform: translateX(0); } }

  .log-entry.add { border-left-color: var(--accent); }
  .log-entry.retire { border-left-color: var(--text-faint); }
  .log-entry.alert { border-left-color: var(--critical); }
  .log-entry.week { border-left-color: var(--warn); }

  .log-meta {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    margin-bottom: 2px;
  }
  .log-tag {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
    padding: 1px 6px; border-radius: var(--radius-pill);
    background: var(--surface-2); color: var(--text-muted);
  }
  .log-entry.add .log-tag { background: var(--accent-soft); color: var(--accent); }
  .log-entry.retire .log-tag { background: var(--surface-2); color: var(--text-faint); }
  .log-entry.alert .log-tag { background: var(--critical-soft); color: var(--critical); }
  .log-entry.week .log-tag { background: var(--warn-soft); color: var(--warn); }
  .log-time { font-size: 10px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .log-text { font-size: 12.5px; color: var(--text); line-height: 1.5; }
  .log-text b { color: var(--text); }

  /* ============================== RESPONSIVE ============================== */
  @media (max-width: 768px) {
    main {
      grid-template-columns: 1fr;
      height: auto;
    }
    .panel-area, .log-area { height: auto; }
    .log-area { border-left: none; border-top: 1px solid var(--border); }
    .log-list { max-height: 420px; }
    .card.span-2 { grid-column: span 1; }
    .brand-sub { display: none; }
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; border: 3px solid var(--surface); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="2" width="36" height="36" rx="10" fill="var(--accent)"/>
        <circle cx="20" cy="20" r="4" fill="#fff"/>
        <circle cx="10" cy="11" r="3" fill="#fff" opacity="0.85"/>
        <circle cx="30" cy="11" r="3" fill="#fff" opacity="0.85"/>
        <circle cx="10" cy="29" r="3" fill="#fff" opacity="0.85"/>
        <circle cx="30" cy="29" r="3" fill="#fff" opacity="0.85"/>
        <path d="M20 20 L10 11 M20 20 L30 11 M20 20 L10 29 M20 20 L30 29" stroke="#fff" stroke-width="1.6" opacity="0.7"/>
      </svg>
      <div>
        <div class="brand-name">Nexus Analytics</div>
        <div class="brand-sub">Agent-Built Metrics Dashboard</div>
      </div>
    </div>

    <div class="week-counter">Demo: Week <b id="weekNow">1</b> / 52</div>

    <button class="btn btn-accent" id="playBtn" title="Auto-advance through weeks">
      <i data-lucide="play"></i><span id="playLabel">Play</span>
    </button>
    <button class="btn" id="askBtn" title="Re-run analysis on current week">
      <i data-lucide="refresh-cw"></i><span>Ask Agent</span>
    </button>
    <button class="btn icon-btn" id="themeBtn" title="Toggle dark / light mode">
      <i data-lucide="moon"></i>
    </button>
  </header>

  <main>
    <section class="panel-area">
      <div class="panel-area-head">
        <h1>Live Dashboard</h1>
        <span class="hint">Panels are generated and retired by the agent</span>
      </div>
      <div class="panel-grid" id="panelGrid">
        <div class="empty-state">Waiting for the agent to analyse the data…</div>
      </div>
    </section>

    <aside class="log-area">
      <div class="log-head">
        <span class="pulse" id="logPulse"></span>
        <h2>Agent Reasoning Log</h2>
      </div>
      <div class="log-list" id="logList"></div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
  /* ====================================================================== */
  /*  NEXUS ANALYTICS — AGENT-BUILT METRICS DASHBOARD                       */
  /* ====================================================================== */

  /* ----------------------------- MOCK DATA ----------------------------- */
  const METRIC_META = {
    mrr:        { label: "MRR",        unit: "£", fmt: "currency", good: "up"   },
    arr:        { label: "ARR",        unit: "£", fmt: "currency", good: "up"   },
    churn_rate: { label: "Churn Rate", unit: "%", fmt: "percent",  good: "down" },
    cac:        { label: "CAC",        unit: "£", fmt: "currency", good: "down" },
    signups:    { label: "Signups",    unit: "",  fmt: "int",      good: "up"   },
    nps:        { label: "NPS",        unit: "",  fmt: "int",      good: "up"   },
  };

  const MOCK_DATA = (function buildMockData() {
    const weeks = 52;
    const mrr = [], churn_rate = [], cac = [], signups = [], nps = [], arr = [];

    // deterministic pseudo-random for reproducibility
    let seed = 42;
    const rand = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed / 0x7fffffff); };
    const jitter = (amt) => (rand() - 0.5) * 2 * amt;

    let mrrVal = 28000;
    for (let w = 0; w < weeks; w++) {
      // MRR: ~3% weekly growth, +40% spike at week 24 (index 23)
      mrrVal = mrrVal * 1.03 + jitter(250);
      if (w === 23) mrrVal *= 1.40; // enterprise launch
      mrr.push(Math.round(mrrVal));
      arr.push(Math.round(mrrVal * 12));

      // Churn: ~1.4%, spike to 4.2% at week 11 (index 10)
      let c = 1.4 + jitter(0.18);
      if (w === 10) c = 4.2;
      if (w === 11) c = 2.3; // tail of incident
      churn_rate.push(+c.toFixed(2));

      // CAC: ~195, drop to 90 at week 38 (index 37) and stays lower
      let cacVal = 195 + jitter(12);
      if (w >= 37) cacVal = 90 + jitter(8);
      cac.push(Math.round(cacVal));

      // Signups: ~48, spike to 140 at week 24 (index 23)
      let s = 48 + jitter(6);
      if (w === 23) s = 140;
      signups.push(Math.round(s));

      // NPS: ~38, drop to 17 at week 11 (index 10)
      let n = 38 + jitter(3);
      if (w === 10) n = 17;
      if (w === 11) n = 27; // partial recovery
      nps.push(Math.round(n));
    }

    return { weeks, mrr, arr, churn_rate, cac, signups, nps };
  })();

  /* --------------------------- STAT HELPERS ---------------------------- */
  function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
  function stdDev(arr) {
    const m = mean(arr);
    return Math.sqrt(mean(arr.map(x => (x - m) ** 2)));
  }
  function fmtValue(metric, v) {
    const meta = METRIC_META[metric];
    if (!meta) return Math.round(v).toString();
    if (meta.fmt === "currency") {
      if (Math.abs(v) >= 1000) return "£" + (v / 1000).toFixed(v >= 100000 ? 0 : 1) + "k";
      return "£" + Math.round(v);
    }
    if (meta.fmt === "percent") return v.toFixed(1) + "%";
    return Math.round(v).toLocaleString();
  }

  /* ----------------------- AGENT ANALYSIS ENGINE ----------------------- */
  // Tracks how long each metric has been "quiet" for retirement logic.
  const quietStreak = {};
  Object.keys(METRIC_META).forEach(m => quietStreak[m] = 0);

  function analyseMetric(metric, weekIndex) {
    const series = MOCK_DATA[metric];
    const start = Math.max(0, weekIndex - 7);
    const window = series.slice(start, weekIndex + 1);     // last up-to-8 weeks
    const current = series[weekIndex];

    const prior = series.slice(Math.max(0, weekIndex - 4), weekIndex);
    const avg4 = prior.length ? mean(prior) : current;
    const pctChange = avg4 ? ((current - avg4) / avg4) * 100 : 0;

    const m = mean(window);
    const sd = stdDev(window);
    const z = sd > 0 ? (current - m) / sd : 0;
    const isAnomaly = Math.abs(z) > 2;

    let trend = "flat";
    if (pctChange > 4) trend = "up";
    else if (pctChange < -4) trend = "down";

    const strongTrend = Math.abs(pctChange) > 8;

    return { metric, current, avg4, pctChange, mean: m, sd, z, isAnomaly, trend, strongTrend };
  }

  /**
   * runAgent(weekIndex, currentPanelIds)
   * Returns a UISpec describing the dashboard the agent wants to render.
   */
  function runAgent(weekIndex, currentPanelIds) {
    const analyses = {};
    Object.keys(METRIC_META).forEach(m => { analyses[m] = analyseMetric(m, weekIndex); });

    const panels = [];
    const addedMetrics = new Set();
    const desiredIds = new Set();

    const meta = (m) => METRIC_META[m];

    const pushPanel = (p) => { panels.push(p); desiredIds.add(p.id); };

    // --- 1. Anomalies become critical alert_cards ---
    const anomalous = [];
    Object.keys(analyses).forEach(m => {
      if (m === "arr") return; // arr handled as milestone kpi
      const a = analyses[m];
      if (a.isAnomaly) {
        anomalous.push(m);
        const worse = (meta(m).good === "up" && a.current < a.mean) || (meta(m).good === "down" && a.current > a.mean);
        pushPanel({
          id: "alert_" + m,
          type: "alert_card",
          title: meta(m).label + " Anomaly Detected",
          metric: m,
          secondary_metric: null,
          priority: "critical",
          agent_insight: `${meta(m).label} hit ${fmtValue(m, a.current)} — that's ${Math.abs(a.z).toFixed(1)} std devs from the 8-week mean of ${fmtValue(m, a.mean)}. This is a clear outlier worth investigating.`,
          suggested_action: worse ? `Investigate ${meta(m).label} root cause` : `Capitalise on ${meta(m).label} momentum`,
          _worse: worse,
        });
        addedMetrics.add(m);
        quietStreak[m] = 0;
      }
    });

    // --- 2. Correlation panels when 2+ metrics anomalous in same week ---
    if (anomalous.length >= 2) {
      // explicit narrative pairs
      const has = (x) => anomalous.includes(x);
      const pairs = [];
      if (has("churn_rate") && has("nps")) pairs.push(["churn_rate", "nps", "Customers churning faster are also rating us lower — a billing migration incident is hurting both retention and sentiment simultaneously."]);
      if (has("mrr") && has("signups")) pairs.push(["mrr", "signups", "The MRR jump is driven by a surge in new signups — the enterprise launch is converting demand into revenue in the same week."]);
      // generic fallback for any other anomalous pair
      if (pairs.length === 0) {
        pairs.push([anomalous[0], anomalous[1], `${meta(anomalous[0]).label} and ${meta(anomalous[1]).label} both broke trend in the same week — likely a shared cause worth a closer look.`]);
      }
      pairs.forEach(([a, b, insight]) => {
        pushPanel({
          id: "corr_" + [a, b].sort().join("_"),
          type: "correlation_panel",
          title: `${meta(a).label} ↔ ${meta(b).label}`,
          metric: a,
          secondary_metric: b,
          priority: "high",
          agent_insight: insight,
          suggested_action: null,
        });
      });
    }

    // --- 3. ARR kpi_card when MRR crosses milestone thresholds (£50k, £100k MRR) ---
    const mrrNow = analyses.mrr.current;
    const mrrPrev = weekIndex > 0 ? MOCK_DATA.mrr[weekIndex - 1] : mrrNow;
    const arrNow = analyses.arr.current;
    const milestones = [50000, 100000];
    let crossed = null;
    milestones.forEach(ms => { if (mrrPrev < ms && mrrNow >= ms) crossed = ms; });
    // Surface the ARR kpi when a milestone is freshly crossed, then keep it pinned afterwards.
    const milestonePinned = currentPanelIds.includes("kpi_arr") || mrrNow >= 50000;
    if (crossed || milestonePinned) {
      pushPanel({
        id: "kpi_arr",
        type: "kpi_card",
        title: "Annual Recurring Revenue",
        metric: "arr",
        secondary_metric: null,
        priority: crossed ? "high" : "low",
        agent_insight: crossed
          ? `Milestone: MRR just crossed ${fmtValue("mrr", crossed)}, putting ARR at ${fmtValue("arr", arrNow)}. The business has reached a meaningful revenue threshold.`
          : `ARR sits at ${fmtValue("arr", arrNow)}, tracking MRR of ${fmtValue("mrr", mrrNow)}.`,
        suggested_action: null,
      });
      addedMetrics.add("arr");
    }

    // --- 4. MRR trend line (the anchor panel) ---
    if (!addedMetrics.has("mrr")) {
      const a = analyses.mrr;
      if (a.strongTrend || weekIndex < 2 || a.trend !== "flat") {
        pushPanel({
          id: "line_mrr",
          type: "line_chart",
          title: "MRR Trend",
          metric: "mrr",
          secondary_metric: null,
          priority: a.strongTrend ? "medium" : "low",
          agent_insight: `MRR is at ${fmtValue("mrr", a.current)}, ${a.pctChange >= 0 ? "up" : "down"} ${Math.abs(a.pctChange).toFixed(1)}% vs the 4-week average. Growth trajectory looks ${a.trend === "up" ? "healthy" : a.trend === "down" ? "concerning" : "stable"}.`,
          suggested_action: null,
        });
        addedMetrics.add("mrr");
        quietStreak.mrr = 0;
      }
    }

    // --- 5. Signups KPI early on / when trending, if not already an alert ---
    if (!addedMetrics.has("signups")) {
      const a = analyses.signups;
      if (weekIndex < 2 || a.strongTrend) {
        pushPanel({
          id: "kpi_signups",
          type: "kpi_card",
          title: "Weekly Signups",
          metric: "signups",
          secondary_metric: null,
          priority: a.strongTrend ? "medium" : "low",
          agent_insight: `${a.current} signups this week, ${a.pctChange >= 0 ? "up" : "down"} ${Math.abs(a.pctChange).toFixed(1)}% vs the recent average.`,
          suggested_action: null,
        });
        addedMetrics.add("signups");
        quietStreak.signups = 0;
      }
    }

    // --- 6. Strong-trend line charts for any remaining metric with real signal ---
    Object.keys(analyses).forEach(m => {
      if (m === "arr") return;
      if (addedMetrics.has(m)) return;
      const a = analyses[m];
      if (a.strongTrend) {
        const improving = (meta(m).good === "up" && a.trend === "up") || (meta(m).good === "down" && a.trend === "down");
        pushPanel({
          id: "line_" + m,
          type: "line_chart",
          title: meta(m).label + " " + (a.trend === "up" ? "Rising" : "Falling"),
          metric: m,
          secondary_metric: null,
          priority: "medium",
          agent_insight: `${meta(m).label} moved to ${fmtValue(m, a.current)} (${a.pctChange >= 0 ? "+" : ""}${a.pctChange.toFixed(1)}% vs 4-week avg) — ${improving ? "a positive shift" : "a shift worth watching"}.`,
          suggested_action: null,
        });
        addedMetrics.add(m);
        quietStreak[m] = 0;
      } else {
        quietStreak[m] += 1;
      }
    });

    // --- 7. Retirement: panels not desired this week, retire after 6 quiet weeks ---
    const retired_panel_ids = [];
    const retire_reasons = {};
    currentPanelIds.forEach(id => {
      if (desiredIds.has(id)) return; // still wanted, keep it
      // find the metric backing this panel
      const backingMetric = id.startsWith("corr_") ? null
        : id.replace(/^(alert_|line_|kpi_)/, "");
      if (id.startsWith("corr_") || id.startsWith("alert_")) {
        // event-driven panels retire as soon as the signal clears
        retired_panel_ids.push(id);
        retire_reasons[id] = id.startsWith("alert_")
          ? `The anomaly has cleared — ${backingMetric ? METRIC_META[backingMetric]?.label || backingMetric : "metric"} has returned to its normal range, so the alert is no longer needed.`
          : `The correlated event has passed; the two metrics are no longer moving together.`;
      } else if (backingMetric && quietStreak[backingMetric] >= 6) {
        retired_panel_ids.push(id);
        retire_reasons[id] = `${METRIC_META[backingMetric]?.label || backingMetric} has shown no significant movement for 6+ weeks, so this panel is being retired to reduce noise.`;
      }
    });

    return { panels, retired_panel_ids, retire_reasons };
  }

  /* ====================================================================== */
  /*  RENDERING                                                             */
  /* ====================================================================== */
  const els = {
    grid: document.getElementById("panelGrid"),
    logList: document.getElementById("logList"),
    weekNow: document.getElementById("weekNow"),
    playBtn: document.getElementById("playBtn"),
    playLabel: document.getElementById("playLabel"),
    askBtn: document.getElementById("askBtn"),
    themeBtn: document.getElementById("themeBtn"),
    logPulse: document.getElementById("logPulse"),
  };

  const state = {
    week: 0,               // 0-indexed
    playing: false,
    timer: null,
    panels: new Map(),     // id -> { spec, el, charts: [] }
  };

  function chartColors() {
    const cs = getComputedStyle(document.body);
    return {
      accent: cs.getPropertyValue("--accent").trim(),
      grid: cs.getPropertyValue("--border").trim(),
      text: cs.getPropertyValue("--text-muted").trim(),
      critical: cs.getPropertyValue("--critical").trim(),
    };
  }

  function makeLineChart(canvas, metric, weeks, opts = {}) {
    const c = chartColors();
    const series = MOCK_DATA[metric];
    const start = Math.max(0, state.week - (weeks - 1));
    const slice = series.slice(start, state.week + 1);
    const labels = slice.map((_, i) => "W" + (start + i + 1));
    const spark = !!opts.spark;
    const color = opts.color || c.accent;

    return new Chart(canvas.getContext("2d"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          data: slice,
          borderColor: color,
          backgroundColor: color + "22",
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          pointRadius: spark ? 0 : 2,
          pointHoverRadius: spark ? 0 : 4,
          pointBackgroundColor: color,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 500 },
        plugins: { legend: { display: false }, tooltip: { enabled: !spark,
          callbacks: { label: (ctx) => fmtValue(metric, ctx.parsed.y) } } },
        scales: spark ? {
          x: { display: false }, y: { display: false },
        } : {
          x: { grid: { display: false }, ticks: { color: c.text, font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 } },
          y: { grid: { color: c.grid }, ticks: { color: c.text, font: { size: 10 },
            callback: (v) => fmtValue(metric, v) } },
        },
      },
    });
  }

  function badge(priority) {
    return `<span class="badge ${priority}">${priority}</span>`;
  }

  function buildCard(spec) {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = spec.id;
    const charts = [];

    if (spec.type === "line_chart") {
      if (spec.priority === "critical" || spec.priority === "high") card.classList.add("span-2");
      const cid = "cv_" + spec.id;
      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="card-title">${spec.title}</div>
            <div class="card-metric-label">${METRIC_META[spec.metric].label}</div>
          </div>
          ${badge(spec.priority)}
        </div>
        <div class="chart-wrap"><canvas id="${cid}"></canvas></div>
        <div class="insight">${spec.agent_insight}</div>`;
      setTimeout(() => {
        const cv = card.querySelector("#" + CSS.escape(cid));
        if (cv) charts.push(makeLineChart(cv, spec.metric, 12));
      }, 0);

    } else if (spec.type === "kpi_card") {
      const a = analyseMetric(spec.metric, state.week);
      const good = METRIC_META[spec.metric].good;
      const improving = (good === "up" && a.pctChange >= 0) || (good === "down" && a.pctChange < 0);
      const dirClass = improving ? "pos" : "neg";
      const arrow = a.pctChange >= 0 ? "trending-up" : "trending-down";
      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="card-title">${spec.title}</div>
            <div class="card-metric-label">${METRIC_META[spec.metric].label}</div>
          </div>
          ${badge(spec.priority)}
        </div>
        <div class="kpi-value ${dirClass}">${fmtValue(spec.metric, a.current)}</div>
        <div class="kpi-trend ${dirClass}">
          <i data-lucide="${arrow}"></i>
          ${a.pctChange >= 0 ? "+" : ""}${a.pctChange.toFixed(1)}% vs 4 weeks ago
        </div>
        <div class="insight">${spec.agent_insight}</div>`;

    } else if (spec.type === "alert_card") {
      if (!spec._worse) card.classList.add("warn-level");
      card.classList.add("alert");
      const a = analyseMetric(spec.metric, state.week);
      const baseline = a.mean;
      card.innerHTML = `
        <div class="alert-head">
          <i data-lucide="alert-triangle"></i> ${METRIC_META[spec.metric].label} Alert
          ${badge(spec.priority)}
        </div>
        <div class="alert-values">
          <div class="alert-val">
            <div class="label">Current</div>
            <div class="num ${spec._worse ? "bad" : ""}">${fmtValue(spec.metric, a.current)}</div>
          </div>
          <div class="alert-val">
            <div class="label">8-wk baseline</div>
            <div class="num">${fmtValue(spec.metric, baseline)}</div>
          </div>
        </div>
        <div class="insight">${spec.agent_insight}</div>
        ${spec.suggested_action ? `<button class="action-btn">${spec.suggested_action}</button>` : ""}`;

    } else if (spec.type === "correlation_panel") {
      card.classList.add("span-2");
      const id1 = "sp1_" + spec.id, id2 = "sp2_" + spec.id;
      const c = chartColors();
      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="card-title"><span class="corr-link"><i data-lucide="git-compare"></i></span> ${spec.title}</div>
            <div class="card-metric-label">Correlated movement</div>
          </div>
          ${badge(spec.priority)}
        </div>
        <div class="corr-grid">
          <div class="corr-col">
            <div class="corr-label">${METRIC_META[spec.metric].label}</div>
            <div class="spark-wrap"><canvas id="${id1}"></canvas></div>
          </div>
          <div class="corr-col">
            <div class="corr-label">${METRIC_META[spec.secondary_metric].label}</div>
            <div class="spark-wrap"><canvas id="${id2}"></canvas></div>
          </div>
        </div>
        <div class="insight">${spec.agent_insight}</div>`;
      setTimeout(() => {
        const cv1 = card.querySelector("#" + CSS.escape(id1));
        const cv2 = card.querySelector("#" + CSS.escape(id2));
        if (cv1) charts.push(makeLineChart(cv1, spec.metric, 12, { spark: true, color: c.accent }));
        if (cv2) charts.push(makeLineChart(cv2, spec.secondary_metric, 12, { spark: true, color: c.critical }));
      }, 0);
    }

    return { el: card, charts };
  }

  /* ----------------------------- LOGGING ------------------------------- */
  function timeStamp() {
    const d = new Date();
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function log(type, text) {
    const entry = document.createElement("div");
    entry.className = "log-entry " + type;
    const tagText = { add: "Add", retire: "Retire", alert: "Alert", week: "Week", info: "Info" }[type] || "Info";
    entry.innerHTML = `
      <div class="log-meta">
        <span class="log-tag">${tagText}</span>
        <span class="log-time">${timeStamp()}</span>
      </div>
      <div class="log-text">${text}</div>`;
    els.logList.prepend(entry);
    // cap log length
    while (els.logList.children.length > 80) els.logList.removeChild(els.logList.lastChild);
  }

  /* --------------------------- ORCHESTRATION --------------------------- */
  function applyUISpec(spec) {
    // Retire panels first
    spec.retired_panel_ids.forEach(id => {
      const p = state.panels.get(id);
      if (!p) return;
      const reason = spec.retire_reasons[id] || "No longer relevant.";
      log("retire", `Retired panel <b>${p.spec.title}</b>. ${reason}`);
      p.el.classList.add("retiring");
      p.charts.forEach(c => { try { c.destroy(); } catch (e) {} });
      const elToRemove = p.el;
      setTimeout(() => { if (elToRemove.parentNode) elToRemove.parentNode.removeChild(elToRemove); }, 320);
      state.panels.delete(id);
    });

    // Add new panels (and update existing ones that changed)
    const desiredOrder = [];
    spec.panels.forEach(ps => {
      desiredOrder.push(ps.id);
      if (state.panels.has(ps.id)) {
        // already present — refresh insight text & data quietly (rebuild for simplicity)
        const existing = state.panels.get(ps.id);
        existing.charts.forEach(c => { try { c.destroy(); } catch (e) {} });
        const rebuilt = buildCard(ps);
        rebuilt.el.style.animation = "none";
        rebuilt.el.style.opacity = "1";
        rebuilt.el.style.transform = "none";
        existing.el.replaceWith(rebuilt.el);
        state.panels.set(ps.id, { spec: ps, el: rebuilt.el, charts: rebuilt.charts });
        if (window.lucide) lucide.createIcons();
        return;
      }
      const built = buildCard(ps);
      els.grid.appendChild(built.el);
      state.panels.set(ps.id, { spec: ps, el: built.el, charts: built.charts });

      const logType = ps.priority === "critical" ? "alert" : "add";
      log(logType, `Added <b>${ps.title}</b> (${ps.type.replace("_", " ")}, ${ps.priority}). ${ps.agent_insight}`);
      if (window.lucide) lucide.createIcons();
    });

    // empty state
    const empty = els.grid.querySelector(".empty-state");
    if (empty) empty.remove();
    if (state.panels.size === 0) {
      els.grid.innerHTML = `<div class="empty-state">The agent sees no significant signal this week. Dashboard intentionally minimal.</div>`;
    }
  }

  function pulse() {
    els.logPulse.classList.add("active");
    setTimeout(() => els.logPulse.classList.remove("active"), 1200);
  }

  function runWeek(announce) {
    els.weekNow.textContent = state.week + 1;
    pulse();

    // narrative week markers
    if (announce) {
      const wk = state.week + 1;
      if (wk === 11) log("week", `<b>Week 11.</b> Agent flagged a billing-migration incident: churn and NPS both broke trend.`);
      else if (wk === 24) log("week", `<b>Week 24.</b> Enterprise launch detected — MRR and signups spiked together.`);
      else if (wk === 38) log("week", `<b>Week 38.</b> New acquisition channel detected — CAC dropped sharply.`);
    }

    const currentIds = Array.from(state.panels.keys());
    const uispec = runAgent(state.week, currentIds);
    applyUISpec(uispec);
  }

  function nextWeek() {
    if (state.week >= MOCK_DATA.weeks - 1) {
      stopPlay();
      log("info", `Reached week 52 — end of demo dataset.`);
      return;
    }
    state.week += 1;
    runWeek(true);
  }

  function startPlay() {
    state.playing = true;
    els.playLabel.textContent = "Pause";
    els.playBtn.querySelector("i").setAttribute("data-lucide", "pause");
    if (window.lucide) lucide.createIcons();
    state.timer = setInterval(nextWeek, 1500);
  }
  function stopPlay() {
    state.playing = false;
    els.playLabel.textContent = "Play";
    els.playBtn.querySelector("i").setAttribute("data-lucide", "play");
    if (window.lucide) lucide.createIcons();
    if (state.timer) clearInterval(state.timer);
    state.timer = null;
  }

  /* ----------------------------- THEME --------------------------------- */
  function setTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    els.themeBtn.querySelector("i").setAttribute("data-lucide", theme === "dark" ? "sun" : "moon");
    if (window.lucide) lucide.createIcons();
    // re-render charts to pick up new axis/grid colours
    rerenderAllCharts();
  }
  function rerenderAllCharts() {
    state.panels.forEach((p) => {
      p.charts.forEach(c => { try { c.destroy(); } catch (e) {} });
      const rebuilt = buildCard(p.spec);
      rebuilt.el.style.animation = "none";
      rebuilt.el.style.opacity = "1";
      rebuilt.el.style.transform = "none";
      p.el.replaceWith(rebuilt.el);
      p.el = rebuilt.el;
      p.charts = rebuilt.charts;
    });
    if (window.lucide) lucide.createIcons();
  }

  /* ----------------------------- EVENTS -------------------------------- */
  els.playBtn.addEventListener("click", () => {
    if (state.playing) stopPlay(); else startPlay();
  });
  els.askBtn.addEventListener("click", () => {
    log("info", `Manual re-analysis requested for week ${state.week + 1}.`);
    const currentIds = Array.from(state.panels.keys());
    const uispec = runAgent(state.week, currentIds);
    applyUISpec(uispec);
    pulse();
  });
  els.themeBtn.addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme");
    setTheme(cur === "dark" ? "light" : "dark");
  });

  /* ------------------------------ INIT --------------------------------- */
  (function init() {
    // theme: default to system preference
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
    els.themeBtn.querySelector("i").setAttribute("data-lucide", prefersDark ? "sun" : "moon");

    if (window.lucide) lucide.createIcons();

    log("info", `Agent online. Analysing Nexus Analytics metrics, week by week.`);
    state.week = 0;
    runWeek(false);
  })();
  </script>
</body>
</html>
